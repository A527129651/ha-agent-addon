name: "HA Agent"
description: "סוכן AI לניהול Home Assistant"
version: "1.0.0"
slug: "ha_agent"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
ports:
  8000/tcp: 8000
options:
  anthropic_api_key: ""
  log_level: "info"
schema:
  anthropic_api_key: str
  log_level: list(debug|info|warning|error)
ingress: true
ingress_port: 8000
panel_icon: mdi:robot
panel_title: "HA Agent"
homeassistant_api: true
auth_api: true
map:
  - config:rw
